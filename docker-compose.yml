version: '3.8'

services:
  backend:
    build: .
    container_name: rag_backend
    ports:
      - "8000:8000"
    env_file:
      - .env  
    volumes:
      - ./chroma_db:/app/chroma_db 

  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "80:80" 
    depends_on:
      - backend